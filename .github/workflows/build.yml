name: Build HTML Project to APK

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project and Copy All Assets
        run: |
          cordova create MojaApka com.mobywatel.app mObywatel
          rm -rf MojaApka/www/*
          rsync -av --exclude="MojaApka" --exclude=".git" --exclude=".github" ./ MojaApka/www/

      - name: Add Android Platform and Build (Debug)
        run: |
          cd MojaApka
          cordova platform add android
          cordova build android --debug

      - name: Prepare Download Page
        run: |
          mkdir public
          cp MojaApka/platforms/android/app/build/outputs/apk/debug/app-debug.apk public/app.apk
          echo '<!DOCTYPE html><html><head><title>Pobierz APK</title><meta charset="utf-8"></head><body style="text-align:center; font-family:sans-serif; margin-top:50px;">' > public/index.html
          echo '<h1>Twoja aplikacja jest gotowa!</h1>' >> public/index.html
          echo '<a href="app.apk" style="font-size:24px; color:white; background:green; padding:15px 30px; text-decoration:none; border-radius:5px;">POBIERZ PLIK APK</a>' >> public/index.html
          echo '</body></html>' >> public/index.html

      - name: Upload and Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        

name: Build HTML Project to APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project and Copy All Assets
        run: |
          # 1. Tworzymy czysty projekt Cordova
          cordova create MojaApka com.mobywatel.app mObywatel
          
          # 2. Czyszczenie domyślnego folderu www
          rm -rf MojaApka/www/*
          
          # 3. Kopiowanie wszystkich plików (HTML, CSS, JS, zdjęcia, GIFy)
          rsync -av --exclude='MojaApka' --exclude='.git' --exclude='.github' ./ MojaApka/www/
          
          # 4. Dodatkowe sprawdzenie, czy GIF-y i zdjęcia na pewno się skopiowały
          echo "Lista skopiowanych plików graficznych w aplikacji:"
          find MojaApka/www/ -type f \( -name "*.gif" -o -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \)

      - name: Add Android Platform and Build
        run: |
          cd MojaApka
          cordova platform add android
          cordova build android --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobywatel-apk
          path: "MojaApka/platforms/android/app/build/outputs/apk/release/*-release-unsigned.apk"
          

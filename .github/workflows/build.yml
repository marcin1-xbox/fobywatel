name: Build HTML Project to APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Find and Unzip HTML Project
        run: |
          # 1. Tworzymy czysty projekt Cordova
          cordova create MojaApka com.mobywatel.app mObywatel
          
          # 2. Szukamy automatycznie jakiegokolwiek pliku .zip w repozytorium
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          echo "Znaleziony plik ZIP: $ZIP_FILE"
          
          # 3. Rozpakowujemy go
          unzip "$ZIP_FILE"
          
          # 4. Czyścimy domyślny folder Cordova i szukamy gdzie wskoczył index.html
          rm -rf MojaApka/www/*
          INDEX_PATH=$(find . -name "index.html" -not -path "./MojaApka/*" | head -n 1)
          HTML_DIR=$(dirname "$INDEX_PATH")
          
          echo "Kopiowanie plików strony z folderu: $HTML_DIR"
          cp -r $HTML_DIR/* MojaApka/www/

      - name: Add Android Platform and Build
        run: |
          cd MojaApka
          # Dodajemy platformę Android do projektu
          cordova platform add android
          # Budujemy plik APK
          cordova build android --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobywatel-apk
          path: "MojaApka/platforms/android/app/build/outputs/apk/release/*-release-unsigned.apk"
          
